name: Check Plan App Builds

on:
  pull_request:
    branches: [main]
    paths:
      - 'plan app/**'
      - '.github/workflows/check-plan-app.yml'

permissions:
  contents: read

jobs:
  android-build:
    name: Android build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plan app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android app
        run: gradle :androidApp:assembleDebug

  ios-build:
    name: iOS build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./plan app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS framework
        run: gradle :shared:linkDebugFrameworkIosSimulatorArm64
